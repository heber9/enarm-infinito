<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ENARM Infinito</title>
<style>
body{margin:0;font-family:system-ui,sans-serif;background:#0a0d14;color:#eef0fa;min-height:100vh;}
.wrap{max-width:740px;margin:0 auto;padding:20px 16px 80px;}
.hdr{padding:14px 0;border-bottom:1px solid #1a2540;margin-bottom:22px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.logo{background:linear-gradient(135deg,#1a4a8a,#3b82f6);border-radius:8px;padding:7px 14px;font-weight:700;font-size:14px;}
.stats{display:none;gap:14px;}.sn{font-size:18px;font-weight:700;font-family:monospace;line-height:1;}.sl{font-size:10px;color:#6b7aad;text-transform:uppercase;}
button{font-family:system-ui;cursor:pointer;border:none;border-radius:8px;padding:9px 18px;font-size:13px;font-weight:500;}
.bp{background:linear-gradient(135deg,#1a3a7a,#3b82f6);color:#fff;}.bp:disabled{background:#1a2540;color:#2e3d6a;cursor:not-allowed;}
.bs{background:#0e1420;color:#6b7aad;border:1px solid #1a2540;}
.mode-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;max-width:500px;margin:24px auto;}
.mc{background:#0e1420;border:1.5px solid #1a2540;border-radius:12px;padding:20px;cursor:pointer;}.mc:hover{border-color:#3b82f6;}
.tgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:7px;margin-bottom:16px;}
.tile{background:#0e1420;border:1.5px solid #1a2540;border-radius:8px;padding:10px;cursor:pointer;display:flex;align-items:center;gap:7px;font-size:13px;}
.tile.on{background:rgba(59,130,246,.1);border-color:#3b82f6;color:#7db4ff;}
.pills{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:16px;}
.pill{padding:5px 12px;border:1.5px solid #1a2540;border-radius:99px;font-size:12px;cursor:pointer;background:transparent;color:#eef0fa;}
.pill.on{background:#131c2e;border-color:#3b82f6;color:#7db4ff;}
.qcard{background:#0e1420;border:1px solid #1a2540;border-radius:10px;padding:16px 18px;margin-bottom:12px;font-size:16px;font-weight:500;line-height:1.55;}
.opts{display:flex;flex-direction:column;gap:7px;}
.opt{background:#0e1420;border:1.5px solid #1a2540;border-radius:8px;padding:11px 14px;cursor:pointer;display:flex;gap:10px;align-items:flex-start;font-size:14px;color:#eef0fa;text-align:left;width:100%;font-family:system-ui;}
.opt:disabled{cursor:not-allowed;}.opt.ok{border-color:#22c55e!important;background:rgba(34,197,94,.08)!important;}.opt.no{border-color:#ef4444!important;background:rgba(239,68,68,.06)!important;}
.ltr{width:22px;height:22px;border:1.5px solid #2e3d6a;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;font-family:monospace;}
.opt.ok .ltr{background:#22c55e;border-color:#22c55e;color:#fff;}.opt.no .ltr{background:#ef4444;border-color:#ef4444;color:#fff;}
.fb{border-left:3px solid;border-radius:0 8px 8px 0;padding:12px 14px;margin-top:10px;font-size:13px;line-height:1.65;}
.fb.ok{background:rgba(34,197,94,.07);border-color:#22c55e;}.fb.no{background:rgba(239,68,68,.05);border-color:#ef4444;}
.fbt{font-size:12px;font-weight:700;margin-bottom:5px;}.fb.ok .fbt{color:#22c55e;}.fb.no .fbt{color:#ef4444;}
.fbb{color:#6b7aad;}
.clave{background:#131c2e;border:1px solid #1a2540;border-radius:6px;padding:8px 12px;margin-top:8px;}
.spinner{width:24px;height:24px;border:2.5px solid #1a2540;border-top-color:#3b82f6;border-radius:50%;margin:0 auto 12px;animation:spin .6s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.errbox{background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.2);border-radius:10px;padding:14px 16px;margin-bottom:12px;}
.cbox{background:#0e1420;border-left:3px solid #3b82f6;border-radius:0 10px 10px 0;padding:12px 16px;margin-bottom:12px;}
.topbar{display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.spill{margin-left:auto;background:#0e1420;border:1px solid #1a2540;border-radius:99px;padding:4px 12px;font-size:12px;font-family:monospace;}
.qbot{display:flex;justify-content:space-between;align-items:center;margin-top:14px;}
</style>
</head>
<body>
<div class="wrap">
<div class="hdr">
  <div class="logo">ENARM Infinito</div>
  <div id="stats" class="stats">
    <div><div class="sn" id="sok" style="color:#22c55e">0</div><div class="sl">OK</div></div>
    <div><div class="sn" id="sno" style="color:#ef4444">0</div><div class="sl">Mal</div></div>
    <div><div class="sn" id="spct" style="color:#3b82f6">--</div><div class="sl">%</div></div>
  </div>
</div>
<div id="app"></div>
</div>
<script>
const TM=[{id:"ivu",n:"IVU"},{id:"exant",n:"Exantem"},{id:"dia",n:"Diarreas"},{id:"vect",n:"Vectores"},{id:"tb",n:"TB"},{id:"vih",n:"VIH"},{id:"resp",n:"Resp"},{id:"snc",n:"SNC"},{id:"its",n:"ITS"}];
const ET={ivu:["E. coli cistitis (fimbrias P, TMP-SMX 1a linea, nitrofurantoina solo cistitis NO pielonefritis)","S. saprophyticus (2a causa mujer joven, resistente novobiocina)","Klebsiella IVU (nosocomial, BLEE carbapenémico)","Proteus mirabilis (ureasa, orina alcalina, estruvita asta de ciervo)","Pielonefritis aguda (cilindros leucocitarios PATOGNOMONICOS, FQ ambulatoria, ceftriaxona IV)","Pionefrosis (obstruccion + infeccion, urgencia quirurgica)","Pielonefritis enfisematosa (gas intrarrenal diabetico, nefrectomia urgente)"],exant:["Sarampion Morbillivirus (manchas Koplik PATOGNOMONICAS 1-2d antes exantema, cefalocaudal)","Escarlatina GAS (papel de lija + lineas Pastia + Filatov, penicilina 10d previene FRA)","Rubeola (adenopatia retroauricular ANTES del exantema, SRC triada Gregg)","Parvovirus B19 (mejillas abofeadas reticulado en encaje, aplasia eritroide drepanocitosis)","Roseola VHH-6 (fiebre alta 3-5d cede bruscamente exantema, crisis febriles 30%)","Varicela VVZ (cielo estrellado distintos estadios, NO aspirina Sindrome Reye)","Kawasaki (fiebre 5d + 4 criterios, IVIG 2g/kg + AAS, aneurismas coronarios 20-25%)","VEB mononucleosis (adenopatia posterior, monospot+, NO ampicilina exantema 80-100%)"],dia:["Rotavirus (lactantes invierno, SRO, vacuna, NO ATB)","Vibrio cholerae (agua de arroz, SRO mortalidad 50% sin ella, doxiciclina)","Shigella (disenteria, convulsiones febriles, azitromicina)","Salmonella no tifoidea (NO ATB inmunocompetentes prolonga portador)","S. Typhi fiebre tifoidea (fiebre escalonada + bradicardia relativa + manchas Faget, perforacion ileal 3a semana)","E. coli O157:H7 STEC (SHU, NO ATB x5 riesgo, NO loperamida)","C. difficile (post-ATB, pseudomembranas, vancomicina VO o fidaxomicina, NO metronidazol 1a linea)","Giardia lamblia (quistes 4 nucleos, malabsorcion, metronidazol)","Entamoeba histolytica (trofozoitos con eritrocitos fagocitados PATOGNOMONICO, absceso hepatico)"],vect:["Dengue DENV 1-4 Aedes aegypti (NS1 dias 1-5, dolor retroorbitario, ADE 2a infeccion, NO AINE)","Zika ZIKV (exantema pruriginoso + conjuntivitis bilateral, microcefalia AXL, SGB post-Zika)","Chikungunya CHIKV el que se encorva (artritis DEBILITANTE bilateral, 30-40% cronica)","P. falciparum (invade TODOS eritrocitos, malaria cerebral PfEMP1, artesunato IV OMS 2023)","P. vivax y ovale (hipnozoitos recaidas verdaderas, cloroquina + primaquina, VERIFICAR G6PD)","Rickettsia rickettsii FMMR (garrapata, exantema centripeto palmas+plantas, doxiciclina TODAS las edades)"],tb:["M. tuberculosis BAAR aerobio (LAM inhibe fagosoma-lisosoma, acidos micolicos)","TB triada (tos mayor 2-3 sem + sudoracion nocturna + perdida de peso)","TB miliar (nodulos 1-3mm bilaterales, urgencia)","Mal de Pott TB vertebral (D10-L1, cifosis, absceso psoas, paraplejia)","TB meningea (LCR glucosa baja + ADA elevada + BAAR 10-40%)","Xpert MTB/RIF (2 horas, TB + resistencia rifampicina)","Esquema 2HRZE/4HR (H neuropatia piridoxina, R hepatitis, Z hiperuricemia, E neuritis optica)","TB-MDR BPaLM (resistencia H+R, 6 meses)","TB-VIH (TARV 2 semanas despues, meningitis TB diferir 4-6 sem)"],vih:["VIH CD4+CCR5/CXCR4 (SRA ELISA negativo, ARN VIH + Ag p24)","SIDA CDC (CD4 menor 200 O enfermedad definitoria 27 condiciones)","TARV universal Biktarvy TAF+FTC+BIC (todos, meta CV menor 50, U=U)","PCP (CD4 menor 200, TMP-SMX altas dosis + prednisona si PaO2 menor 70)","Criptococo meningeo (anfotericina B + flucitosina 2 sem, fluconazol, punciones HIC)","Toxoplasmosis cerebral (lesion anillo CD4 menor 100, tratar EMPIRICO, biopsia si no responde)","CMV retinitis queso y ketchup (CD4 menor 50, URGENCIA ganciclovir IV)","MAC CD4 menor 50 (hemocultivos, azitromicina + etambutol)","TMF (TARV CV indetectable menor 1%, PCR diagnostico menor 18 meses)"],resp:["Croup Parainfluenza-1 (tos perruna estridor, signo campanario Rx, dexametasona dosis unica)","VRS bronquiolitis (lactantes, SOLO soporte, NO broncodilatadores NO corticoides)","B. pertussis tosferina (paroxismos+whoop+vomito, leucocitosis LINFOCITOSIS, azitromicina)","S. pneumoniae NAC (bacteria #1 todas edades, amoxicilina ambulatoria)","Mycoplasma walking pneumonia (Rx peor que clinica, azitromicina, sin pared)","MIS-C post-COVID (2-6 semanas, IVIG + AAS, disfuncion VI 50%)"],snc:["Enterovirus meningitis aseptica (85-90% virales, LCR glucosa NORMAL)","S. pneumoniae meningitis (ceftriaxona + dexametasona ANTES del ATB, reduce sordera)","Listeria meningitis mayor 50 anos (ceftriaxona NO cubre, AMPICILINA OBLIGATORIA)","VHS-1 encefalitis (lobulo temporal, afasia+convulsiones, aciclovir IV URGENTE sin esperar PCR)","Anti-NMDAR encefalitis (psicosis + discinesias + convulsiones, teratoma ovarico, IVIG)"],its:["Sifilis T. pallidum (chancro INDOLORO, VDRL+FTA-ABS, 2a exantema PALMO-PLANTAR, penicilina G nunca resistencia)","HSV-2 herpes genital (ulcera DOLOROSA multiple recurrente, aciclovir)","H. ducreyi chancroide (dolorosa + bubon fluctuante, azitromicina 1g)","Chlamydia L1-L3 LGV (bubon bilateral multilocular, doxiciclina 21 dias)","N. gonorrhoeae (diplococos GN intracelulares PMN, ceftriaxona IM, NO fluoroquinolonas)","Gardnerella VB (flujo gris + olor pescado + pH mayor 4.5 + celulas clave, metronidazol)","Candida (flujo grumoso blanco, pH menor 4.5, prurito, fluconazol dosis unica)"]};
const ANG=[{id:"agente",n:"Agente",i:"Pregunta SOLO sobre el agente etiologico: nombre exacto o caracteristica distintiva. NO clinica ni tratamiento."},{id:"clinica",n:"Clinica",i:"Pregunta SOLO sobre sintoma cardinal o signo patognomonico. NO agente ni tratamiento."},{id:"tx",n:"Tratamiento",i:"Pregunta SOLO sobre el farmaco de primera linea y por que ese y no otro."},{id:"comp",n:"Complicacion",i:"Pregunta SOLO sobre la complicacion mas importante y cuando ocurre."},{id:"dif",n:"Diferencial",i:"Pregunta SOLO sobre el dato que diferencia ESTA etiologia de otra similar."},{id:"err",n:"Error",i:"Pregunta SOLO sobre el ERROR o CONTRAINDICACION clasica. Usa forma negativa."}];
const SD='Genera preguntas ENARM infectologia mexicana. SOLO JSON sin markdown: {"pregunta":"...","opciones":["...","...","...","..."],"correcta":0,"explicacion":"...","clave":"..."} correcta=indice 0-3. pregunta=directa 1-2 lineas. opciones=4 plausibles confundibles. explicacion=3 lineas. clave=frase memorable max 12 palabras.';
const SC='Genera casos clinicos ENARM infectologia mexicana. SOLO JSON sin markdown: {"caso":"...","pregunta":"...","opciones":["...","...","...","..."],"correcta":0,"explicacion":"...","clave":"..."} correcta=indice 0-3. caso=4 lineas datos clinicos. pregunta=diagnostico/agente/tratamiento. opciones=4 plausibles. explicacion=3-4 lineas. clave=dato patognomonico.';
const LT=["A","B","C","D"];
let S={p:"home",m:null,t:[],a:ANG.map(x=>x.id),aa:true,q:null,c:false,e:null,r:false,el:null,ok:0,tot:0,rc:0,h:[],dk:[]};
const mx=a=>{const r=[...a];for(let i=r.length-1;i>0;i--){const j=~~(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}return r;};
function bD(){const aa=S.aa?ANG.map(x=>x.id):S.a;const p=[];S.t.forEach(t=>(ET[t]||[]).forEach(e=>aa.forEach(a=>p.push({t,e,a}))));S.dk=mx(p);}
function nP(){if(!S.dk.length)bD();return S.dk.shift()||{t:S.t[0],e:(ET[S.t[0]]||[""])[0],a:"agente"};}
async function gen(){
  if(!S.t.length)return;
  set({c:true,e:null,q:null,r:false,el:null});
  const par=nP();const ang=ANG.find(x=>x.id===par.a)||ANG[0];
  const mem=S.h.length?"\nYA PREGUNTADO NO REPETIR: "+S.h.slice(-15).join(" | "):"";
  const sys=S.m==="d"?SD:SC;
  const usr=S.m==="d"?"ETIOLOGIA: "+par.e+"\nINSTRUCCION: "+ang.i+mem+"\nGenera UNA pregunta directa del tipo indicado.":"ETIOLOGIA: "+par.e+mem+"\nGenera UN caso clinico con agente, clinica, tratamiento y complicacion.";
  try{
    const r=await fetch("/api/ask",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:700,system:sys,messages:[{role:"user",content:usr}]})});
    if(!r.ok)throw new Error("HTTP "+r.status);
    const d=await r.json();
    const raw=d.content.map(c=>c.text||"").join("").replace(/```json|```/g,"").trim();
    let q;try{q=JSON.parse(raw);}catch{const m=raw.match(/{[sS]*}/);if(!m)throw new Error("JSON invalido");q=JSON.parse(m[0]);}
    if(!q.pregunta||!Array.isArray(q.opciones)||q.opciones.length<4)throw new Error("Respuesta incompleta");
    S.h=[...S.h,q.pregunta.substring(0,40)].slice(-60);
    set({c:false,q:{...q,tid:par.t,aid:par.a}});
  }catch(ex){set({c:false,e:ex.message});}
}
function eleg(i){if(S.r||!S.q)return;const ok=i===S.q.correcta;set({r:true,el:i,ok:S.ok+(ok?1:0),tot:S.tot+1,rc:ok?S.rc+1:0});uS();}
function uS(){const e=document.getElementById("stats");if(!e)return;e.style.display=S.tot?"flex":"none";const p=S.tot?~~(S.ok/S.tot*100):null;document.getElementById("sok").textContent=S.ok;document.getElementById("sno").textContent=S.tot-S.ok;document.getElementById("spct").textContent=p!==null?p+"%":"--";}
const set=p=>{Object.assign(S,p);R();};
const tT=id=>set({t:S.t.includes(id)?S.t.filter(x=>x!==id):[...S.t,id]});
const tA=id=>{if(id==="all"){set({aa:true,a:ANG.map(x=>x.id)});return;}const n=S.a.includes(id)?S.a.filter(x=>x!==id):[...S.a,id];set({aa:!n.length,a:n.length?n:ANG.map(x=>x.id)});};
function ini(){if(!S.t.length)return;bD();S.h=[];S.ok=0;S.tot=0;S.rc=0;set({p:"quiz"});gen();}
function R(){
  const app=document.getElementById("app");uS();
  const{p,m,t,a,aa,q,c,e,r,el,ok,tot,rc}=S;
  if(p==="home"){app.innerHTML='<div style="text-align:center;padding:40px 0 30px"><div style="font-size:26px;font-weight:700;margin-bottom:8px">ENARM Infectologia</div><div style="color:#6b7aad;margin-bottom:28px">Agente - Clinica - Tratamiento - Complicaciones</div><div class="mode-row"><div class="mc" onclick="window.SM('d')"><div style="font-size:18px;font-weight:600;margin-bottom:8px">Preguntas directas</div><div style="color:#6b7aad;font-size:13px;margin-bottom:14px">Una pregunta, un dato concreto.</div><button class="bp" style="width:100%">Empezar</button></div><div class="mc" onclick="window.SM('c')"><div style="font-size:18px;font-weight:600;margin-bottom:8px">Casos clinicos</div><div style="color:#6b7aad;font-size:13px;margin-bottom:14px">Paciente real con diagnostico y tratamiento.</div><button class="bp" style="background:linear-gradient(135deg,#085041,#0f6e56);width:100%">Empezar</button></div></div></div>';return;}
  if(p==="config"){app.innerHTML='<div><div class="topbar"><button class="bs" onclick="window.GI()">Inicio</button><span style="color:#6b7aad;font-size:13px">'+(m==="d"?"Preguntas directas":"Casos clinicos")+'</span></div><div style="font-size:11px;font-weight:600;text-transform:uppercase;color:#6b7aad;margin-bottom:8px">Temas</div><div class="tgrid">'+TM.map(x=>'<div class="tile'+(t.includes(x.id)?" on":"")+'" onclick="window.TT(''+x.id+'')">'+x.n+(t.includes(x.id)?' <span style="margin-left:auto;font-size:10px;color:#3b82f6">ok</span>':"")+' </div>').join("")+'</div>'+(m==="d"?'<div style="font-size:11px;font-weight:600;text-transform:uppercase;color:#6b7aad;margin-bottom:8px">Enfoque</div><div class="pills"><div class="pill'+(aa?" on":"")+'" onclick="window.TA('all')">Todo</div>'+ANG.map(x=>'<div class="pill'+(!aa&&a.includes(x.id)?" on":"")+'" onclick="window.TA(''+x.id+'')">'+x.n+'</div>').join("")+'</div>':"")+'<div style="display:flex;gap:10px;margin-top:4px"><button class="bs" onclick="window.ST()">Todos los temas</button><button class="bp" '+(t.length?"":"disabled")+' onclick="window.INI()">Generar primera pregunta</button></div></div>';return;}
  if(p==="quiz"){
    let b="";
    if(c)b='<div style="text-align:center;padding:52px 0"><div class="spinner"></div><p style="color:#6b7aad">Generando '+(m==="d"?"pregunta":"caso clinico")+'...</p></div>';
    else if(e)b='<div class="errbox"><div style="color:#ef4444;font-weight:600;margin-bottom:4px">Error al generar</div><div style="color:#6b7aad;font-size:12px;margin-bottom:10px">'+e+'</div><button class="bp" onclick="window.GEN()">Reintentar</button></div>';
    else if(q){
      if(m==="c"&&q.caso)b+='<div class="cbox"><div style="font-size:10px;font-weight:700;text-transform:uppercase;color:#3b82f6;margin-bottom:5px">Caso clinico</div><div style="font-size:14px;color:#6b7aad;line-height:1.65">'+q.caso+'</div></div>';
      b+='<div class="qcard">'+q.pregunta+'</div>';
      b+='<div class="opts">'+q.opciones.map((o,i)=>{let cl="opt";if(r){if(i===q.correcta)cl+=" ok";else if(i===el&&i!==q.correcta)cl+=" no";}return'<button class="'+cl+'" '+(r?"disabled":"")+'onclick="window.EL('+i+')"><span class="ltr">'+LT[i]+'</span><span style="flex:1">'+o+'</span></button>';}).join("")+'</div>';
      if(r){const io=el===q.correcta;b+='<div class="fb '+(io?"ok":"no")+'"><div class="fbt">'+(io?"Correcto":"Incorrecto - Respuesta correcta: "+q.opciones[q.correcta])+'</div><div class="fbb">'+q.explicacion+(q.clave?'<div class="clave"><strong>Dato clave:</strong> '+q.clave+'</div>':"")+'</div></div>';}
    }
    const p2=tot?~~(ok/tot*100):null;
    app.innerHTML='<div><div class="topbar"><button class="bs" onclick="window.GI()">Inicio</button><span style="color:#6b7aad;font-size:12px">'+(m==="d"?"Directas":"Casos")+'</span>'+(tot?'<span class="spill">'+ok+'/'+tot+' - '+p2+'%'+(rc>=3?" R"+rc:'')+'</span>':"")+'</div>'+b+'<div class="qbot"><span style="color:#f59e0b;font-size:13px;font-weight:600">'+(rc>=3?"Racha "+rc:"")+'</span><button class="bp" '+(r?"":"disabled")+' onclick="window.GEN()">Siguiente</button></div></div>';
  }
}
window.SM=m=>set({m,p:"config"});
window.GI=()=>set({p:"home",m:null,t:[],q:null,e:null});
window.TT=tT;window.TA=tA;window.ST=()=>set({t:TM.map(x=>x.id)});window.INI=ini;window.GEN=gen;window.EL=eleg;
R();
</script>
</body>
</html>
