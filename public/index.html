<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ENARM Infinito</title>
<style>
body{margin:0;font-family:system-ui,sans-serif;background:#0a0d14;color:#eef0fa;min-height:100vh;}
.wrap{max-width:740px;margin:0 auto;padding:20px 16px 80px;}
.hdr{padding:14px 0;border-bottom:1px solid #1a2540;margin-bottom:22px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.logo{background:linear-gradient(135deg,#1a4a8a,#3b82f6);border-radius:8px;padding:7px 14px;font-weight:700;font-size:14px;}
.stats{display:none;gap:14px;}.sn{font-size:18px;font-weight:700;font-family:monospace;}.sl{font-size:10px;color:#6b7aad;text-transform:uppercase;}
button{font-family:system-ui;cursor:pointer;border:none;border-radius:8px;padding:9px 18px;font-size:13px;font-weight:500;}
.bp{background:linear-gradient(135deg,#1a3a7a,#3b82f6);color:#fff;}.bp:disabled{background:#1a2540;color:#2e3d6a;cursor:not-allowed;}
.bs{background:#0e1420;color:#6b7aad;border:1px solid #1a2540;}
.mode-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;max-width:500px;margin:24px auto;}
.mc{background:#0e1420;border:1.5px solid #1a2540;border-radius:12px;padding:20px;cursor:pointer;transition:.15s;}.mc:hover{border-color:#3b82f6;}
.tgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:7px;margin-bottom:16px;}
.tile{background:#0e1420;border:1.5px solid #1a2540;border-radius:8px;padding:10px;cursor:pointer;display:flex;align-items:center;gap:7px;font-size:13px;}
.tile.on{background:rgba(59,130,246,.1);border-color:#3b82f6;color:#7db4ff;}
.pills{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:16px;}
.pill{padding:5px 12px;border:1.5px solid #1a2540;border-radius:99px;font-size:12px;cursor:pointer;background:transparent;color:#eef0fa;}
.pill.on{background:#131c2e;border-color:#3b82f6;color:#7db4ff;}
.qcard{background:#0e1420;border:1px solid #1a2540;border-radius:10px;padding:16px 18px;margin-bottom:12px;font-size:16px;font-weight:500;line-height:1.55;}
.opts{display:flex;flex-direction:column;gap:7px;}
.opt{background:#0e1420;border:1.5px solid #1a2540;border-radius:8px;padding:11px 14px;cursor:pointer;display:flex;gap:10px;align-items:flex-start;font-size:14px;color:#eef0fa;text-align:left;width:100%;font-family:system-ui;}
.opt:disabled{cursor:not-allowed;}.opt.ok{border-color:#22c55e!important;background:rgba(34,197,94,.08)!important;}.opt.no{border-color:#ef4444!important;background:rgba(239,68,68,.06)!important;}
.ltr{width:22px;height:22px;border:1.5px solid #2e3d6a;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;font-family:monospace;}
.opt.ok .ltr{background:#22c55e;border-color:#22c55e;color:#fff;}.opt.no .ltr{background:#ef4444;border-color:#ef4444;color:#fff;}
.fb{border-left:3px solid;border-radius:0 8px 8px 0;padding:12px 14px;margin-top:10px;font-size:13px;line-height:1.65;}
.fb.ok{background:rgba(34,197,94,.07);border-color:#22c55e;}.fb.no{background:rgba(239,68,68,.05);border-color:#ef4444;}
.fbt{font-size:12px;font-weight:700;margin-bottom:5px;}.fb.ok .fbt{color:#22c55e;}.fb.no .fbt{color:#ef4444;}.fbb{color:#6b7aad;}
.clave{background:#131c2e;border:1px solid #1a2540;border-radius:6px;padding:8px 12px;margin-top:8px;}
.spinner{width:24px;height:24px;border:2.5px solid #1a2540;border-top-color:#3b82f6;border-radius:50%;margin:0 auto 12px;animation:spin .6s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.errbox{background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.2);border-radius:10px;padding:14px 16px;margin-bottom:12px;}
.cbox{background:#0e1420;border-left:3px solid #3b82f6;border-radius:0 10px 10px 0;padding:12px 16px;margin-bottom:12px;}
.topbar{display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.spill{margin-left:auto;background:#0e1420;border:1px solid #1a2540;border-radius:99px;padding:4px 12px;font-size:12px;font-family:monospace;}
.qbot{display:flex;justify-content:space-between;align-items:center;margin-top:14px;}
</style>
</head>

</div>
